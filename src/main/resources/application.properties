# ============================================
# CONFIGURATION DE L'APPLICATION
# ============================================
spring.application.name=si-expert
server.port=8080
spring.main.allow-bean-definition-overriding=true
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/si-expert}
app.keycloak.admin.server-url=${KEYCLOAK_ADMIN_SERVER_URL:http://localhost:8081}
app.keycloak.admin.realm=${KEYCLOAK_ADMIN_TARGET_REALM:si-expert}
app.keycloak.admin.admin-realm=${KEYCLOAK_ADMIN_AUTH_REALM:master}
app.keycloak.admin.client-id=${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
app.keycloak.admin.client-secret=${KEYCLOAK_ADMIN_CLIENT_SECRET:}
app.keycloak.admin.username=${KEYCLOAK_ADMIN_USERNAME:admin}
app.keycloak.admin.password=${KEYCLOAK_ADMIN_PASSWORD:admin}
app.carence.threshold-hours=${APP_CARENCE_THRESHOLD_HOURS:48}

# ============================================
# CONFIGURATION PostgreSQL
# ============================================
# Temporairement utiliser H2 pour test
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Clés API RapidAPI (TecDoc) - avec valeurs par défaut
rapiapi.key=${RAPIDAPI_KEY:test-key}
rapiapi.host=${RAPIDAPI_HOST:test-host}

# ============================================
# CONFIGURATION JPA / HIBERNATE
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# create : Crée les tables à chaque démarrage
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true

# Afficher les requetes SQL dans la console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Chargement des données de test
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.encoding=UTF-8

# Debug des parametres SQL
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# CONFIGURATION JWT
# ============================================
jwt.secret=mysupersecretkeythathas64characterslongandsecureforhs256!!!
jwt.expiration=86400000