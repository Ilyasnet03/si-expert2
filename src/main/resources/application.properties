# ============================================
# CONFIGURATION DE L'APPLICATION
# ============================================
spring.application.name=si-expert
server.port=8080

# ============================================
# CONFIGURATION PostgreSQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/si_expert_db
spring.datasource.username=postgres
spring.datasource.password=password111
spring.datasource.driver-class-name=org.postgresql.Driver

# Clés API RapidAPI (TecDoc) - avec valeurs par défaut
rapidapi.key=${RAPIDAPI_KEY:test-key}
rapidapi.host=${RAPIDAPI_HOST:test-host}

# ============================================
# CONFIGURATION JPA / HIBERNATE
# ============================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# create : Crée les tables à chaque démarrage
spring.jpa.hibernate.ddl-auto=create

# Afficher les requetes SQL dans la console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Debug des parametres SQL
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ============================================
# CONFIGURATION DONNEES DE TEST (data.sql)
# ============================================
# Active l'initialisation SQL
spring.sql.init.mode=always

# Emplacement du fichier SQL
spring.sql.init.data-locations=classpath:data.sql

# Encodage UTF-8
spring.sql.init.encoding=UTF-8

# Attend que les tables soient prêtes
spring.jpa.defer-datasource-initialization=true

# Continue même si erreur (pour debug)
spring.sql.init.continue-on-error=true

# Logs pour voir l'exécution
logging.level.org.springframework.jdbc.datasource.init=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG

# ============================================
# CONFIGURATION JACKSON (JSON)
# ============================================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Africa/Casablanca

# ============================================
# CONFIGURATION LOGGING
# ============================================
logging.level.org.springframework.web=INFO
logging.level.com.wafa.assurance=DEBUG

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ============================================
# OPTIMISATION CONNEXION (Hikari)
# ============================================
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=trues