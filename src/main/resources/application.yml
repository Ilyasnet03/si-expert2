spring:
  application:
    name: si-expert

  datasource:
    url: jdbc:h2:mem:testdb
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true

  sql:
    init:
      mode: never

  jackson:
    date-format: "yyyy-MM-dd HH:mm:ss"

  security:
    oauth2:
      resource-server:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8081/realms/si-expert}

  jwt:
    secret: mySecretKey1234567890123456789012345678901234567890
    expiration: 86400000
    date-format: "yyyy-MM-dd HH:mm:ss"
    time-zone: Africa/Casablanca

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# Configuration d'upload des fichiers
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  keycloak:
    admin:
      server-url: ${KEYCLOAK_ADMIN_SERVER_URL:http://localhost:8081}
      realm: ${KEYCLOAK_ADMIN_TARGET_REALM:si-expert}
      admin-realm: ${KEYCLOAK_ADMIN_AUTH_REALM:master}
      client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
      client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
      username: ${KEYCLOAK_ADMIN_USERNAME:admin}
      password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
  upload:
    dir: ./uploads
  carence:
    threshold-hours: ${APP_CARENCE_THRESHOLD_HOURS:48}
  port: 8080

logging:
  level:
    com.wafa.assurance: DEBUG
    org.hibernate.SQL: DEBUG
    # Pour voir si le script SQL est bien exécuté
    org.springframework.jdbc.datasource.init: DEBUG

# Configuration JWT
jwt:
  secret: mysupersecretkeythathas32characterslong!!!
  expiration: 86400000  # 24 heures en millisecondes